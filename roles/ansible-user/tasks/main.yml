- name: Create ansible user
  ansible.builtin.user:
    name: ansy
    shell: /bin/bash
    home: /home/ansy
    create_home: true
    state: present

- name: Ensure sudoers.d directory exists
  ansible.builtin.file:
    path: /etc/sudoers.d
    state: directory
    mode: '0750'

- name: Install sudo
  ansible.builtin.apt:
    name: sudo
    state: present

- name: Ensure .ssh directory exists for ansible user
  ansible.builtin.file:
    path: /home/ansy/.ssh
    state: directory
    owner: ansy
    group: ansy
    mode: '0700'

- name: Deploy SSH private key for ansible user
  ansible.builtin.copy:
    content: "{{ vault_ansy_ssh_private_key }}"
    dest: /home/ansy/.ssh/id_ed25519
    owner: ansy
    group: ansy
    mode: '0600'

- name: Grant ansible user passwordless sudo
  ansible.builtin.copy:
    content: "ansy ALL=(ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/ansy
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
