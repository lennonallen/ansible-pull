- name: Install required packages
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
      - golang
    state: present

- name: Install xcaddy
  ansible.builtin.shell:
    cmd: go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
    creates: /root/go/bin/xcaddy

- name: Build Caddy with Cloudflare plugin
  ansible.builtin.shell:
    cmd: /root/go/bin/xcaddy build --with github.com/caddy-dns/cloudflare --output /usr/bin/caddy
    creates: /usr/bin/caddy

- name: Create Caddy systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/caddy.service
    content: |
      [Unit]
      Description=Caddy
      After=network.target

      [Service]
      User=caddy
      Group=caddy
      ExecStart=/usr/bin/caddy run --config /etc/caddy/Caddyfile
      ExecReload=/usr/bin/caddy reload --config /etc/caddy/Caddyfile
      TimeoutStopSec=5s
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  notify: Reload systemd

- name: Create caddy user
  ansible.builtin.user:
    name: caddy
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/caddy
    create_home: true

- name: Create Caddy config directory
  ansible.builtin.file:
    path: /etc/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: '0755'

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: caddy
    group: caddy
    mode: '0644'
  notify: Reload Caddy

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
