- name: Server Setup
  hosts: temp
  become: true

  vars_files:
    - vars/vault.yml

  vars:
    github_user: lennonallen
    github_repo: ansible-pull

  pre_tasks:
    - name: Update all packages
      tags: update
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Install git
      ansible.builtin.apt:
        name: git
        state: present

  roles:
    - ansible-user
    - ansible-pull-setup
